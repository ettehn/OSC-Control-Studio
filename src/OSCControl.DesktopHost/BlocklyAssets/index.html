<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSCControl Blockly Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div>
      <strong>OSCControl Blockly Prototype</strong>
      <span id="status">Loading Blockly...</span>
    </div>
    <button id="postButton" type="button">Send To Host</button>
  </header>

  <main class="layout">
    <section id="blocklyDiv" aria-label="Blockly workspace"></section>
    <aside class="preview">
      <h2>Generated .osccontrol</h2>
      <pre id="scriptPreview"></pre>
    </aside>
  </main>

  <xml id="toolbox" style="display:none">
    <category name="OSCControl" colour="#4f46e5">
      <block type="osc_endpoint_udp"></block>
      <block type="osc_startup_rule"></block>
      <block type="osc_receive_rule"></block>
      <block type="osc_log"></block>
      <block type="osc_send_simple"></block>
      <block type="osc_raw_step"></block>
    </category>
  </xml>

  <xml id="startBlocks" style="display:none">
    <block type="osc_endpoint_udp" x="32" y="32">
      <field name="NAME">oscIn</field>
      <field name="MODE">input</field>
      <field name="HOST">127.0.0.1</field>
      <field name="PORT">9000</field>
      <next>
        <block type="osc_startup_rule">
          <statement name="STACK">
            <block type="osc_log">
              <field name="LEVEL">info</field>
              <field name="VALUE">ready</field>
            </block>
          </statement>
        </block>
      </next>
    </block>
  </xml>

  <!-- Vendor Blockly files are intentionally not committed yet. Place the bundled Blockly files under vendor/blockly/. -->
  <script src="vendor/blockly/blockly_compressed.js"></script>
  <script src="vendor/blockly/blocks_compressed.js"></script>
  <script src="vendor/blockly/msg/en.js"></script>
  <script src="osccontrol-blocks.js"></script>
  <script src="osccontrol-generator.js"></script>
  <script src="osccontrol-editor.js"></script>
</body>
</html>
